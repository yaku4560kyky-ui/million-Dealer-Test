<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ディーラーテスト統合システム</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンコンポーネント ---
    const Plus = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2 = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const ChevronDown = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
    const ChevronUp = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
    const GripVertical = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>;
    const Gamepad2 = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>;
    const Spade = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13.522C5 11.233 12 2 12 2s7 9.233 7 11.522c0 2.38-1.56 4.478-4.5 4.478-1.574 0-2.886-.688-3.5-2.012-.614 1.324-1.926 2.012-3.5 2.012-2.94 0-4.5-2.098-4.5-4.478z"></path><path d="M12 18v4"></path><path d="M8 22h8"></path></svg>;
    const SquareUser = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect><circle cx="12" cy="10" r="3"></circle><path d="M7 21v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"></path></svg>;
    const Coins = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"></circle><path d="M18.09 10.37A6 6 0 1 1 10.34 18"></path><path d="M7 6h1v4"></path><path d="M16.71 13.88l-1.42 1.42"></path></svg>;
    const Send = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
    const Copy = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const XIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const CheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const CircleIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"></circle></svg>;
    const TriangleIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>;

    // データのエンコード・デコード関数（URL渡し用）
    const encodeData = (obj) => btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
    const decodeData = (str) => {
      try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } 
      catch (e) { return null; }
    };

    const copyToClipboard = (text, alertMsg) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
        alert(alertMsg || 'URLをコピーしました！');
      } catch (err) {
        alert('コピーに失敗しました。');
      }
      document.body.removeChild(textArea);
    };

    const GAME_CONFIG = {
      poker: {
        id: 'poker', name: 'ポーカー', icon: Spade,
        theme: { primary: 'bg-emerald-600', hover: 'hover:bg-emerald-700', text: 'text-emerald-600', border: 'border-emerald-500', lightBg: 'bg-emerald-50', addBtnHover: 'hover:border-emerald-500 hover:text-emerald-600 hover:bg-emerald-50' },
        categories: [
          { name: '大問1', title: '語句問題' }, { name: '大問2', title: '役判定、アクション順、レイズ額' },
          { name: '大問3', title: '所作、TDA案件処理' }, { name: '大問4', title: 'トーナメント進行、ポット計算' }
        ]
      },
      blackjack: {
        id: 'blackjack', name: 'ブラックジャック', icon: SquareUser,
        theme: { primary: 'bg-blue-600', hover: 'hover:bg-blue-700', text: 'text-blue-600', border: 'border-blue-500', lightBg: 'bg-blue-50', addBtnHover: 'hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50' },
        categories: [ { name: '大問1', title: '基本語句・ルール' }, { name: '大問2', title: '配当・アクション処理' } ]
      },
      baccarat: {
        id: 'baccarat', name: 'バカラ', icon: Coins,
        theme: { primary: 'bg-rose-600', hover: 'hover:bg-rose-700', text: 'text-rose-600', border: 'border-rose-500', lightBg: 'bg-rose-50', addBtnHover: 'hover:border-rose-500 hover:text-rose-600 hover:bg-rose-50' },
        categories: [ { name: '大問1', title: '基本語句・ルール' }, { name: '大問2', title: '3枚目ルール・配当' } ]
      }
    };

    const initialQuestions = [
      { id: '1', game: 'poker', category: '大問1', text: 'ストラドルを説明せよ', correctAnswer: 'UTGがブラインドの2倍額をブラインドとして出すルール' },
      { id: '2', game: 'poker', category: '大問1', text: '相手が出したチップに対してさらに上乗せすることを何と呼ぶか答えよ', correctAnswer: 'レイズ' },
      { id: '3', game: 'poker', category: '大問2', text: 'ブラインド100/200。UTGが500にレイズしました。次のプレイヤーのミニマムレイズ額は？', correctAnswer: '800' },
      { id: '4', game: 'poker', category: '大問3', text: 'アウトオブターン（順番飛ばし）のアクションはどのように扱われるか？', correctAnswer: '状況が変わらなければ拘束される' },
      { id: '5', game: 'poker', category: '大問4', text: 'Aが500にレイズ、Bがショートで600のオールイン。Cがコール。Aの順番に戻った時、Aはリオープン可能か？', correctAnswer: '不可能（コールまたはフォールドのみ）' }
    ];

    const initialTestSettings = {
      poker: { '大問1': { count: 2, point: 2 }, '大問2': { count: 1, point: 3 }, '大問3': { count: 1, point: 4 }, '大問4': { count: 1, point: 5 } },
      blackjack: { '大問1': { count: 2, point: 2 }, '大問2': { count: 2, point: 3 } },
      baccarat: { '大問1': { count: 2, point: 2 }, '大問2': { count: 2, point: 3 } }
    };

    // ==========================================
    // 1. 問題作成・管理ページ (ManageView)
    // ==========================================
    function ManageView() {
      const [questions, setQuestions] = useState(() => {
        const saved = localStorage.getItem('app_questions');
        return saved ? JSON.parse(saved) : initialQuestions;
      });
      const [testSettings, setTestSettings] = useState(() => {
        const saved = localStorage.getItem('app_settings');
        return saved ? JSON.parse(saved) : initialTestSettings;
      });
      const [activeGame, setActiveGame] = useState('poker');
      const [activeTab, setActiveTab] = useState('大問1');
      const [expandedId, setExpandedId] = useState(null);
      const [generatedURL, setGeneratedURL] = useState('');
      const [isModalOpen, setIsModalOpen] = useState(false);

      useEffect(() => {
        localStorage.setItem('app_questions', JSON.stringify(questions));
        localStorage.setItem('app_settings', JSON.stringify(testSettings));
      }, [questions, testSettings]);

      useEffect(() => {
        setActiveTab(GAME_CONFIG[activeGame].categories[0].name);
        setExpandedId(null);
      }, [activeGame]);

      const currentTheme = GAME_CONFIG[activeGame].theme;
      const currentCategories = GAME_CONFIG[activeGame].categories;

      const addQuestion = (category) => {
        const newId = Math.random().toString(36).substr(2, 9);
        setQuestions([...questions, { id: newId, game: activeGame, category, text: '', correctAnswer: '' }]);
        setExpandedId(newId);
      };
      const removeQuestion = (id) => { if (confirm('削除しますか？')) setQuestions(questions.filter(q => q.id !== id)); };
      const updateQuestion = (id, field, value) => setQuestions(questions.map(q => q.id === id ? { ...q, [field]: value } : q));
      
      const updateSetting = (field, value) => {
        const numValue = Math.max(0, parseInt(value) || 0);
        setTestSettings(prev => ({
          ...prev, [activeGame]: { ...prev[activeGame], [activeTab]: { ...prev[activeGame][activeTab], [field]: numValue } }
        }));
      };

      // 【テスト生成処理】
      const handleGenerateURL = () => {
        const currentSet = testSettings[activeGame];
        const gameQuestions = questions.filter(q => q.game === activeGame);
        const selected = [];
        
        Object.keys(currentSet).forEach(cat => {
          const conf = currentSet[cat];
          if (conf.count > 0) {
            let pool = gameQuestions.filter(q => q.category === cat);
            for (let i = pool.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            pool.slice(0, conf.count).forEach(q => selected.push([q.text, q.correctAnswer || '', conf.point]));
          }
        });

        if (selected.length === 0) return alert('出題される問題がありません。出題数と問題プールを確認してください。');

        const payload = { g: activeGame, q: selected };
        
        // ローカル（Fileプロトコル）で開いている場合は、URLパラメータ形式(?test=)で渡す。そうでない場合はHash(#test=)を使う
        const isFileProtocol = window.location.protocol === 'file:';
        const searchOrHash = isFileProtocol ? `?test=${encodeData(payload)}` : `#test=${encodeData(payload)}`;
        
        // iframeの制約を回避するため、親のURLを取得
        const originURL = window.location.origin === "null" ? "file://" + window.location.pathname : window.location.origin + window.location.pathname;

        const url = originURL + searchOrHash;
        setGeneratedURL(url);
        setIsModalOpen(true);
      };

      const filteredQuestions = questions.filter(q => q.game === activeGame && q.category === activeTab);
      const activeCategoryDesc = currentCategories.find(c => c.name === activeTab) || currentCategories[0];
      const activeTabSettings = testSettings[activeGame][activeTab];
      const currentTotalScore = Object.values(testSettings[activeGame]).reduce((sum, s) => sum + (s.point * s.count), 0);

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-20">
            <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:justify-between md:items-center gap-4">
              <div className="flex items-center space-x-2">
                <Gamepad2 className="w-6 h-6 text-emerald-400" />
                <h1 className="text-xl font-bold tracking-wider">問題作成・管理ページ</h1>
              </div>
              <div className="flex items-center space-x-4">
                <div className="text-sm font-bold text-slate-300">総得点: <span className="text-white text-lg">{currentTotalScore}点</span></div>
                <button onClick={handleGenerateURL} className={`flex items-center space-x-2 text-white px-5 py-2 rounded-md font-bold transition-colors shadow-sm ${currentTheme.primary} ${currentTheme.hover}`}>
                  <Send className="w-5 h-5" /><span>回答用URLを生成</span>
                </button>
              </div>
            </div>
          </header>

          <div className="bg-white border-b border-slate-200 shadow-sm sticky top-[72px] md:top-[76px] z-10">
            <div className="max-w-6xl mx-auto flex overflow-x-auto">
              {Object.values(GAME_CONFIG).map(game => (
                <button key={game.id} onClick={() => setActiveGame(game.id)} className={`flex-1 py-4 font-bold border-b-4 transition-all ${activeGame === game.id ? `border-${game.theme.border.split('-')[1]}-500 ${game.theme.text} bg-slate-50` : 'border-transparent text-slate-500'}`}>
                  <game.icon className="w-5 h-5 inline-block mr-2" /> {game.name}
                </button>
              ))}
            </div>
          </div>

          <main className="max-w-6xl w-full mx-auto p-4 flex flex-col md:flex-row gap-6 mt-4 flex-1">
            <aside className="w-full md:w-64 flex-shrink-0">
              <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden sticky top-40">
                <div className={`p-4 ${currentTheme.primary} text-white font-bold`}>大問選択</div>
                <ul>
                  {currentCategories.map(cat => {
                    const cSet = testSettings[activeGame][cat.name];
                    const isTabActive = activeTab === cat.name;
                    return (
                      <li key={cat.name}>
                        <button onClick={() => setActiveTab(cat.name)} className={`w-full text-left px-4 py-3 border-l-4 ${isTabActive ? `${currentTheme.border} ${currentTheme.lightBg}` : 'border-transparent hover:bg-slate-50'}`}>
                          <div className={`font-bold ${isTabActive ? currentTheme.text : 'text-slate-700'}`}>{cat.name}</div>
                          <div className="text-xs text-slate-500 mt-1">{cSet.count}問 × {cSet.point}点 = {cSet.count * cSet.point}点</div>
                        </button>
                      </li>
                    );
                  })}
                </ul>
              </div>
            </aside>

            <div className="flex-1">
              <div className={`mb-6 p-5 rounded-lg border-2 shadow-sm ${currentTheme.lightBg} border-opacity-50 ${currentTheme.border}`}>
                <h2 className={`text-xl font-bold ${currentTheme.text} mb-4`}>{activeCategoryDesc.title} の出題設定</h2>
                <div className="flex gap-6">
                  <div>
                    <label className="text-xs font-bold text-slate-500 block mb-1">1問の配点</label>
                    <input type="number" value={activeTabSettings.point} onChange={(e) => updateSetting('point', e.target.value)} className="w-20 p-2 text-lg font-bold border rounded text-center" /> 点
                  </div>
                  <div>
                    <label className="text-xs font-bold text-slate-500 block mb-1">出題数 (ランダム抽出)</label>
                    <input type="number" value={activeTabSettings.count} onChange={(e) => updateSetting('count', e.target.value)} className="w-20 p-2 text-lg font-bold border rounded text-center" /> 問
                  </div>
                </div>
              </div>

              <div className="space-y-4">
                {filteredQuestions.map((q, index) => (
                  <div key={q.id} className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                    <div className="flex justify-between p-4 cursor-pointer hover:bg-slate-50" onClick={() => setExpandedId(expandedId === q.id ? null : q.id)}>
                      <div className="font-bold flex items-center space-x-2"><GripVertical className="w-4 h-4 text-slate-400"/> <span>No.{index + 1}</span> <span className="text-slate-600 font-medium ml-2">{q.text || '問題文を入力...'}</span></div>
                    </div>
                    {expandedId === q.id && (
                      <div className="p-5 border-t bg-slate-50 space-y-4">
                        <div>
                          <label className="block text-sm font-bold mb-1">問題文 (回答者に見えます)</label>
                          <textarea value={q.text} onChange={(e) => updateQuestion(q.id, 'text', e.target.value)} className="w-full p-2 border rounded outline-none" rows="2" />
                        </div>
                        <div>
                          <label className="block text-sm font-bold mb-1">模範解答 (採点者のみ見えます)</label>
                          <textarea value={q.correctAnswer} onChange={(e) => updateQuestion(q.id, 'correctAnswer', e.target.value)} className="w-full p-2 border rounded outline-none font-medium text-emerald-700" rows="1" />
                        </div>
                        <div className="text-right">
                          <button onClick={() => removeQuestion(q.id)} className="text-red-500 text-sm font-bold hover:underline">この問題を削除</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
                <button onClick={() => addQuestion(activeTab)} className={`w-full py-4 border-2 border-dashed text-slate-500 font-bold rounded-lg ${currentTheme.addBtnHover}`}>+ 新しい問題をプールに追加</button>
              </div>
            </div>
          </main>

          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-xl overflow-hidden">
                <div className={`p-4 text-white font-bold flex justify-between ${currentTheme.primary}`}>
                  <span>回答用URLの生成完了</span>
                  <button onClick={() => setIsModalOpen(false)}><XIcon className="w-6 h-6" /></button>
                </div>
                <div className="p-6">
                  <p className="mb-4 text-slate-600 font-medium">以下のURLをコピーして、テストを受ける回答者に送信してください。（LINE等でも送信可能です）<br/><span className="text-xs text-rose-500">※プレビュー環境では新しいタブで手動で開いてください。</span></p>
                  <div className="bg-slate-100 p-4 rounded-lg text-sm break-all h-32 overflow-y-auto mb-4 border border-slate-300 text-slate-600 select-all">
                    {generatedURL}
                  </div>
                  <button onClick={() => copyToClipboard(generatedURL, '回答用URLをコピーしました！')} className={`w-full flex items-center justify-center space-x-2 text-white py-3 rounded-lg font-bold shadow-md transition-colors ${currentTheme.primary} ${currentTheme.hover}`}>
                    <Copy className="w-5 h-5" /><span>URLをコピーする</span>
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 2. 回答ページ (TestView)
    // ==========================================
    function TestView({ payload }) {
      const data = decodeData(payload);
      const [examineeName, setExamineeName] = useState('');
      const [answers, setAnswers] = useState(data ? new Array(data.q.length).fill('') : []);
      const [submittedURL, setSubmittedURL] = useState('');

      if (!data || !data.q) return <div className="p-10 text-center text-red-500 font-bold">無効なテストURLです。</div>;

      const theme = GAME_CONFIG[data.g]?.theme || GAME_CONFIG.poker.theme;
      const totalPoints = data.q.reduce((sum, q) => sum + q[2], 0);

      const handleSubmit = () => {
        if (!examineeName.trim()) return alert('氏名を入力してください。');
        if (answers.some(a => !a.trim()) && !confirm('未入力の問題がありますが、このまま提出しますか？')) return;
        
        const scorePayload = { n: examineeName, g: data.g, q: data.q, a: answers };
        const isFileProtocol = window.location.protocol === 'file:';
        const searchOrHash = isFileProtocol ? `?score=${encodeData(scorePayload)}` : `#score=${encodeData(scorePayload)}`;
        const originURL = window.location.origin === "null" ? "file://" + window.location.pathname : window.location.origin + window.location.pathname;

        const url = originURL + searchOrHash;
        setSubmittedURL(url);
        window.scrollTo(0,0);
      };

      if (submittedURL) {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
            <div className={`max-w-lg w-full bg-white rounded-xl shadow-lg p-8 text-center border-t-8 border-${theme.border.split('-')[1]}-500`}>
              <CheckCircle className={`w-20 h-20 mx-auto mb-4 ${theme.text}`} />
              <h2 className="text-2xl font-bold text-slate-800 mb-2">回答の提出が完了しました</h2>
              <p className="text-slate-600 mb-6 font-medium">お疲れ様でした。以下の<span className="text-rose-500 font-bold">「採点用URL」</span>をコピーして、担当の管理者に送信してください。</p>
              
              <div className="bg-slate-100 p-4 rounded-lg text-sm break-all h-24 overflow-y-auto mb-4 border border-slate-300 text-slate-600 select-all text-left">
                {submittedURL}
              </div>

              <button onClick={() => copyToClipboard(submittedURL, '採点用URLをコピーしました！管理者に送信してください。')} className={`w-full flex items-center justify-center space-x-2 text-white py-4 rounded-lg font-bold shadow-md transition-colors ${theme.primary} ${theme.hover}`}>
                <Copy className="w-5 h-5" /><span>採点用URLをコピーして送る</span>
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 pb-20">
          <header className={`${theme.primary} text-white p-4 shadow-md text-center font-bold text-xl sticky top-0 z-20`}>
            {GAME_CONFIG[data.g].name} 認定テスト
          </header>
          
          <main className="max-w-3xl mx-auto p-4 mt-6">
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
              <label className="block text-sm font-bold text-slate-700 mb-2">あなたの氏名 <span className="text-red-500">*</span></label>
              <input type="text" value={examineeName} onChange={e => setExamineeName(e.target.value)} placeholder="フルネームを入力" className={`w-full p-3 border-2 border-slate-300 rounded-lg outline-none focus:border-${theme.border.split('-')[1]}-500 font-bold text-lg`} />
            </div>

            <div className="mb-4 flex justify-between items-end">
              <h2 className="text-xl font-bold text-slate-800">問題一覧</h2>
              <span className="text-slate-500 font-bold text-sm">全 {data.q.length} 問 / {totalPoints} 点満点</span>
            </div>

            {data.q.map((q, i) => (
              <div key={i} className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6">
                <div className="flex items-center space-x-3 mb-4">
                  <span className={`bg-slate-800 text-white font-bold px-3 py-1 rounded text-sm`}>第 {i + 1} 問</span>
                  <span className="text-slate-400 font-bold text-sm">配点: {q[2]}点</span>
                </div>
                <p className="text-lg font-medium text-slate-800 mb-4 whitespace-pre-wrap leading-relaxed">{q[0]}</p>
                <textarea 
                  value={answers[i]} onChange={e => { const newA = [...answers]; newA[i] = e.target.value; setAnswers(newA); }}
                  className={`w-full border-2 border-slate-200 rounded-lg p-3 outline-none focus:border-${theme.border.split('-')[1]}-500 transition-colors`}
                  rows="3" placeholder="ここに解答を入力してください..."
                ></textarea>
              </div>
            ))}

            <button onClick={handleSubmit} className={`w-full py-4 mt-4 rounded-xl text-white font-bold text-lg shadow-lg ${theme.primary} ${theme.hover} flex items-center justify-center space-x-2`}>
              <Send className="w-6 h-6" /><span>回答を提出する</span>
            </button>
          </main>
        </div>
      );
    }

    // ==========================================
    // 3. 採点ページ (ScoreView)
    // ==========================================
    function ScoreView({ payload }) {
      const data = decodeData(payload);
      const [marks, setMarks] = useState(data ? new Array(data.q.length).fill(null) : []);

      if (!data || !data.q || !data.a) return <div className="p-10 text-center text-red-500 font-bold">無効な採点URLです。</div>;

      const theme = GAME_CONFIG[data.g]?.theme || GAME_CONFIG.poker.theme;
      
      const handleMark = (index, val) => {
        const newM = [...marks];
        newM[index] = val;
        setMarks(newM);
      };

      const totalScore = marks.reduce((sum, m, i) => sum + (m !== null ? data.q[i][2] * m : 0), 0);
      const maxScore = data.q.reduce((sum, q) => sum + q[2], 0);

      return (
        <div className="min-h-screen bg-slate-100 pb-20">
          <header className={`bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-20`}>
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <div>
                <div className="text-slate-400 text-xs font-bold mb-1">受験者</div>
                <div className="text-xl font-bold flex items-center space-x-2"><SquareUser className="w-5 h-5"/><span>{data.n}</span></div>
              </div>
              <div className="text-right">
                <div className="text-slate-400 text-xs font-bold mb-1">採点結果</div>
                <div className="text-3xl font-black text-amber-400">{totalScore} <span className="text-lg font-medium text-slate-300">/ {maxScore} 点</span></div>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto p-4 mt-4">
            <div className="bg-blue-50 border border-blue-200 text-blue-800 p-4 rounded-lg text-sm font-medium mb-6">
              回答者の解答と模範解答を比較し、各問題の下部にある「〇」「△」「×」ボタンで採点してください。上の合計点数が自動で計算されます。
            </div>

            {data.q.map((q, i) => {
              const point = q[2];
              const mark = marks[i];
              return (
                <div key={i} className={`bg-white rounded-xl shadow-md border-l-8 mb-6 overflow-hidden ${mark === 1 ? 'border-emerald-500' : mark === 0.5 ? 'border-amber-400' : mark === 0 ? 'border-rose-500' : 'border-slate-300'}`}>
                  <div className="p-5 border-b border-slate-100">
                    <div className="flex items-center justify-between mb-3">
                      <span className="bg-slate-100 text-slate-600 font-bold px-3 py-1 rounded-full text-xs">Q {i + 1}</span>
                      <span className="text-slate-500 font-bold text-sm">配点: {point} 点</span>
                    </div>
                    <p className="text-slate-800 font-medium mb-4">{q[0]}</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="bg-emerald-50 p-4 rounded-lg border border-emerald-100">
                        <div className="text-xs font-bold text-emerald-600 mb-1">模範解答</div>
                        <div className="text-slate-800 font-medium">{q[1] || <span className="text-slate-400 italic">設定なし</span>}</div>
                      </div>
                      <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                        <div className="text-xs font-bold text-blue-600 mb-1">{data.n} さんの解答</div>
                        <div className="text-slate-800 font-medium whitespace-pre-wrap">{data.a[i] || <span className="text-slate-400 italic">未回答</span>}</div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-slate-50 p-3 flex flex-col sm:flex-row gap-2">
                    <button onClick={() => handleMark(i, 1)} className={`flex-1 py-3 rounded-lg font-bold border-2 flex items-center justify-center space-x-2 transition-all ${mark === 1 ? 'bg-emerald-100 border-emerald-500 text-emerald-700 shadow-inner' : 'bg-white border-slate-200 text-slate-400 hover:border-emerald-300 hover:text-emerald-500'}`}>
                      <CircleIcon className="w-6 h-6" /> <span>正解 ({point}点)</span>
                    </button>
                    <button onClick={() => handleMark(i, 0.5)} className={`flex-1 py-3 rounded-lg font-bold border-2 flex items-center justify-center space-x-2 transition-all ${mark === 0.5 ? 'bg-amber-100 border-amber-500 text-amber-700 shadow-inner' : 'bg-white border-slate-200 text-slate-400 hover:border-amber-300 hover:text-amber-500'}`}>
                      <TriangleIcon className="w-6 h-6" /> <span>部分点 ({point / 2}点)</span>
                    </button>
                    <button onClick={() => handleMark(i, 0)} className={`flex-1 py-3 rounded-lg font-bold border-2 flex items-center justify-center space-x-2 transition-all ${mark === 0 ? 'bg-rose-100 border-rose-500 text-rose-700 shadow-inner' : 'bg-white border-slate-200 text-slate-400 hover:border-rose-300 hover:text-rose-500'}`}>
                      <XIcon className="w-6 h-6" /> <span>不正解 (0点)</span>
                    </button>
                  </div>
                </div>
              );
            })}
          </main>
        </div>
      );
    }

    // ==========================================
    // ルーティング
    // ==========================================
    function App() {
      const [hash, setHash] = useState(window.location.hash);
      const [search, setSearch] = useState(window.location.search);
      
      useEffect(() => {
        const onLocationChange = () => {
          setHash(window.location.hash);
          setSearch(window.location.search);
        };
        window.addEventListener('hashchange', onLocationChange);
        
        // URLパラメータの監視用 (ローカルファイル対策)
        let lastUrl = location.href; 
        const observer = new MutationObserver(() => {
          const url = location.href;
          if (url !== lastUrl) {
            lastUrl = url;
            onLocationChange();
          }
        });
        observer.observe(document, {subtree: true, childList: true});
        
        return () => {
           window.removeEventListener('hashchange', onLocationChange);
           observer.disconnect();
        };
      }, []);

      const payload = hash.startsWith('#test=') ? hash.replace('#test=', '') : 
                      hash.startsWith('#score=') ? hash.replace('#score=', '') : 
                      search.startsWith('?test=') ? new URLSearchParams(search).get('test') :
                      search.startsWith('?score=') ? new URLSearchParams(search).get('score') : null;

      if (hash.startsWith('#test=') || search.startsWith('?test=')) return <TestView payload={payload} />;
      if (hash.startsWith('#score=') || search.startsWith('?score=')) return <ScoreView payload={payload} />;
      
      return <ManageView />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

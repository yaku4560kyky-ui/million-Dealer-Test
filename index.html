<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ディーラーテスト問題管理ツール (記述式)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (JSXをブラウザで変換するため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- アプリケーションの描画領域 -->
  <div id="root"></div>

  <!-- Reactのコード -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンコンポーネント (LucideのSVGを直接定義) ---
    const Download = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Plus = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2 = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const ChevronDown = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
    const ChevronUp = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
    const GripVertical = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>;
    const Gamepad2 = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>;
    const Spade = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13.522C5 11.233 12 2 12 2s7 9.233 7 11.522c0 2.38-1.56 4.478-4.5 4.478-1.574 0-2.886-.688-3.5-2.012-.614 1.324-1.926 2.012-3.5 2.012-2.94 0-4.5-2.098-4.5-4.478z"></path><path d="M12 18v4"></path><path d="M8 22h8"></path></svg>;
    const SquareUser = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect><circle cx="12" cy="10" r="3"></circle><path d="M7 21v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"></path></svg>;
    const Coins = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"></circle><path d="M18.09 10.37A6 6 0 1 1 10.34 18"></path><path d="M7 6h1v4"></path><path d="M16.71 13.88l-1.42 1.42"></path></svg>;

    // ゲームごとの設定とテーマカラー (Tailwind CDN用に完全な文字列で定義)
    const GAME_CONFIG = {
      poker: {
        id: 'poker',
        name: 'ポーカー',
        icon: Spade,
        fileName: 'poker_written_test.csv',
        theme: {
          primary: 'bg-emerald-600',
          hover: 'hover:bg-emerald-700',
          text: 'text-emerald-600',
          border: 'border-emerald-500',
          lightBg: 'bg-emerald-50',
          addBtnHover: 'hover:border-emerald-500 hover:text-emerald-600 hover:bg-emerald-50'
        },
        categories: [
          { name: '大問1', title: '語句問題', desc: 'ポーカーの基礎用語 (2点)' },
          { name: '大問2', title: '役判定、アクション順、レイズ額', desc: '実践計算 (3点)' },
          { name: '大問3', title: '所作、TDA案件処理', desc: 'ルール裁定 (4点)' },
          { name: '大問4', title: 'トーナメント進行、ポット計算', desc: '複雑な処理 (5点)' }
        ]
      },
      blackjack: {
        id: 'blackjack',
        name: 'ブラックジャック',
        icon: SquareUser,
        fileName: 'blackjack_written_test.csv',
        theme: {
          primary: 'bg-blue-600',
          hover: 'hover:bg-blue-700',
          text: 'text-blue-600',
          border: 'border-blue-500',
          lightBg: 'bg-blue-50',
          addBtnHover: 'hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50'
        },
        categories: [
          { name: '大問1', title: '基本語句・ルール', desc: 'BJの基本知識' },
          { name: '大問2', title: '配当・アクション処理', desc: 'BJの配当計算・ルール処理' }
        ]
      },
      baccarat: {
        id: 'baccarat',
        name: 'バカラ',
        icon: Coins,
        fileName: 'baccarat_written_test.csv',
        theme: {
          primary: 'bg-rose-600',
          hover: 'hover:bg-rose-700',
          text: 'text-rose-600',
          border: 'border-rose-500',
          lightBg: 'bg-rose-50',
          addBtnHover: 'hover:border-rose-500 hover:text-rose-600 hover:bg-rose-50'
        },
        categories: [
          { name: '大問1', title: '基本語句・ルール', desc: 'バカラの基本知識' },
          { name: '大問2', title: '3枚目ルール・配当', desc: 'ドロールール・配当計算' }
        ]
      }
    };

    // 初期サンプルデータ
    const initialQuestions = [
      // --- ポーカー ---
      { id: '1', game: 'poker', category: '大問1', text: 'ストラドルを説明せよ', correctAnswer: 'UTGがブラインドの2倍額をブラインドとして出すオプションルール', explanation: 'ストラドルは主にUTGがブラインドの2倍額をブラインドとして出すオプションルールです。' },
      { id: '2', game: 'poker', category: '大問1', text: '相手が出したチップに対してさらに上乗せすることを何と呼ぶか答えよ', correctAnswer: 'レイズ', explanation: '同額を出すのがコール、さらに額をつり上げるのがレイズです。' },
      { id: '1_1', game: 'poker', category: '大問1', text: '「アンテ」の意味として正しいものは？', correctAnswer: 'ゲーム参加者全員が毎ハンド支払う強制参加費', explanation: 'アンテはポットを大きくしゲームを活性化するために支払う参加費です。' },
      { id: '3', game: 'poker', category: '大問2', text: 'ブラインド100/200。UTGが500にレイズしました。次のプレイヤーのミニマムレイズ額は？', correctAnswer: '800', explanation: 'レイズ幅は500-200=300。次は500+300=800がミニマムとなります。' },
      { id: '4', game: 'poker', category: '大問3', text: 'TDAルールにおいて、アウトオブターン（順番飛ばし）のアクションはどのように扱われるか？', correctAnswer: 'アクションが回ってくるまでに状況が変わらなければ拘束される', explanation: '前方のプレイヤーのアクションが変わらない限り、アウトオブターンのアクションは有効として扱われます。' },
      { id: '5', game: 'poker', category: '大問4', text: 'ブラインド100/200。Aが500にレイズ、Bがショートスタックで600のオールイン。Cがコール。Aに順番が戻った時、Aはリオープン可能か？', correctAnswer: '不可能（コールまたはフォールドのみ）', explanation: 'ショートオールインはフルレイズ額に達していないため、既にアクションを終えているAはリオープンできません。' },
      
      // --- ブラックジャック ---
      { id: 'bj1_1', game: 'blackjack', category: '大問1', text: '最初の2枚で「A」と「10点のカード（10, J, Q, K）」が揃うことを何と呼ぶか？', correctAnswer: 'ブラックジャック（またはナチュラル）', explanation: 'Aと10点札の組み合わせをブラックジャックと呼びます。' },
      { id: 'bj1_2', game: 'blackjack', category: '大問1', text: 'プレイヤーがカードをもう1枚要求するアクションを何と呼ぶか？', correctAnswer: 'ヒット', explanation: 'カードを追加で引くアクションは「ヒット」です。' },
      { id: 'bj1_4', game: 'blackjack', category: '大問1', text: '最初の2枚が同じ点数札の時、ハンドを2つに分けてそれぞれで勝負するアクションは？', correctAnswer: 'スプリット', explanation: '同点数のカードを2つの独立したハンドに分けることを「スプリット」と呼びます。' },
      { id: 'bj2_1', game: 'blackjack', category: '大問2', text: '通常のブラックジャック（BJ）が完成して勝利した場合の配当はいくらか？', correctAnswer: '1.5倍 (3 to 2)', explanation: 'BJの配当は通常1.5倍（3 to 2）です。' },
      { id: 'bj2_3', game: 'blackjack', category: '大問2', text: 'ハウスルールで一般的な「ディーラーのアクション」の決まりとして正しいものは？', correctAnswer: '16以下はヒット、17以上はスタンド', explanation: 'ディーラーは自身の意思に関係なく、合計が17以上になるまで引き続けなければなりません。' },

      // --- バカラ ---
      { id: 'bac1_1', game: 'baccarat', category: '大問1', text: 'バカラにおいて勝敗を決めるのは、カードの合計の「下一桁」がいくつに近い方か？', correctAnswer: '9', explanation: 'バカラは合計の下一桁が「9」に近い方が勝利となります。' },
      { id: 'bac1_3', game: 'baccarat', category: '大問1', text: 'バカラにおける絵札「J・Q・K」および「10」の点数はいくつか？', correctAnswer: '0点', explanation: 'バカラでは10と絵札はすべて「0点」として扱われます。' },
      { id: 'bac1_4', game: 'baccarat', category: '大問1', text: 'バンカーとプレイヤーの点数が同じになることに賭けるエリアを何と呼ぶか？', correctAnswer: 'タイ (Tie)', explanation: '引き分けを予想して賭けるベットをタイ（Tie）と呼びます。' },
      { id: 'bac2_1', game: 'baccarat', category: '大問2', text: 'プレイヤーの最初の2枚の合計が「5」の時、プレイヤー側のアクションはどうなるか？', correctAnswer: '3枚目を引く（ヒット）', explanation: 'プレイヤーの合計が「0〜5」の場合は必ず3枚目のカードを引きます。' },
      { id: 'bac2_2', game: 'baccarat', category: '大問2', text: 'プレイヤーの最初の2枚の合計が「6」または「7」の時、プレイヤー側のアクションはどうなるか？', correctAnswer: 'スタンドする', explanation: 'プレイヤーの合計が「6」か「7」の場合はスタンドとなり、3枚目は引きません。' },
      { id: 'bac2_4', game: 'baccarat', category: '大問2', text: '通常のバカラ（コミッションバカラ）において、バンカー勝利時の配当は？', correctAnswer: '0.95倍', explanation: 'バンカー勝利時は5%のコミッションが引かれ、配当は0.95倍となります。' }
    ];

    function App() {
      const [questions, setQuestions] = useState(initialQuestions);
      const [activeGame, setActiveGame] = useState('poker');
      const [activeTab, setActiveTab] = useState('大問1');
      const [expandedId, setExpandedId] = useState(null);

      // ゲームが切り替わった時に、最初の大問タブを選択し直す
      useEffect(() => {
        setActiveTab(GAME_CONFIG[activeGame].categories[0].name);
        setExpandedId(null);
      }, [activeGame]);

      const currentTheme = GAME_CONFIG[activeGame].theme;
      const currentCategories = GAME_CONFIG[activeGame].categories;

      // 問題の追加
      const addQuestion = (category) => {
        const newId = Math.random().toString(36).substr(2, 9);
        setQuestions([
          ...questions,
          {
            id: newId,
            game: activeGame,
            category: category,
            text: '',
            correctAnswer: '',
            explanation: ''
          }
        ]);
        setExpandedId(newId);
      };

      // 問題の削除
      const removeQuestion = (id) => {
        if (confirm('この問題を削除しますか？')) {
          setQuestions(questions.filter(q => q.id !== id));
        }
      };

      // 問題データの更新
      const updateQuestion = (id, field, value) => {
        setQuestions(questions.map(q => {
          if (q.id === id) {
            return { ...q, [field]: value };
          }
          return q;
        }));
      };

      // CSVダウンロード処理
      const downloadCSV = () => {
        const header = ['大問', '問題文', '模範解答', '解説'];
        const gameQuestions = questions.filter(q => q.game === activeGame);
        
        const rows = gameQuestions.map(q => [
          q.category,
          q.text,
          q.correctAnswer,
          q.explanation || ''
        ]);

        const csvContent = [header, ...rows]
          .map(row => row.map(item => `"${String(item).replace(/"/g, '""')}"`).join(','))
          .join('\n');

        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
        
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', GAME_CONFIG[activeGame].fileName);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const filteredQuestions = questions.filter(q => q.game === activeGame && q.category === activeTab);
      const activeCategoryDesc = currentCategories.find(c => c.name === activeTab) || currentCategories[0];
      const activeGameQuestionsCount = questions.filter(q => q.game === activeGame).length;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
          
          {/* ヘッダー */}
          <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-20">
            <div className="max-w-6xl mx-auto flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div className="flex items-center space-x-2">
                <Gamepad2 className="w-6 h-6 text-slate-300" />
                <h1 className="text-xl font-bold tracking-wider">ディーラーテスト問題管理ツール (記述式)</h1>
              </div>
              
              <button 
                onClick={downloadCSV}
                className={`flex items-center justify-center space-x-2 text-white px-5 py-2 rounded-md font-bold transition-colors shadow-sm ${currentTheme.primary} ${currentTheme.hover}`}
              >
                <Download className="w-4 h-4" />
                <span>{GAME_CONFIG[activeGame].name}のテストを出力</span>
              </button>
            </div>
          </header>

          {/* ゲーム切り替えタブ */}
          <div className="bg-white border-b border-slate-200 shadow-sm sticky top-[72px] z-10">
            <div className="max-w-6xl mx-auto flex overflow-x-auto">
              {Object.values(GAME_CONFIG).map(game => {
                const Icon = game.icon;
                const isActive = activeGame === game.id;
                return (
                  <button
                    key={game.id}
                    onClick={() => setActiveGame(game.id)}
                    className={`flex-1 flex justify-center items-center space-x-2 py-4 px-6 font-bold text-sm sm:text-base transition-all whitespace-nowrap
                      ${isActive 
                        ? `border-b-4 ${game.theme.border} ${game.theme.text} bg-slate-50` 
                        : 'border-b-4 border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-700'
                      }
                    `}
                  >
                    <Icon className={`w-5 h-5 ${isActive ? game.theme.text : 'text-slate-400'}`} />
                    <span>{game.name} テスト</span>
                  </button>
                );
              })}
            </div>
          </div>

          <main className="max-w-6xl mx-auto p-4 flex flex-col md:flex-row gap-6 mt-6">
            
            {/* サイドバー（大問ナビゲーション） */}
            <aside className="w-full md:w-64 flex-shrink-0">
              <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden sticky top-40">
                <div className={`p-4 ${currentTheme.primary} text-white font-bold flex items-center space-x-2`}>
                  <span>テスト構成</span>
                </div>
                <ul className="flex flex-col">
                  {currentCategories.map(cat => {
                    const count = questions.filter(q => q.game === activeGame && q.category === cat.name).length;
                    const isTabActive = activeTab === cat.name;
                    return (
                      <li key={cat.name}>
                        <button
                          onClick={() => setActiveTab(cat.name)}
                          className={`w-full text-left px-4 py-3 flex justify-between items-center transition-colors border-l-4 ${
                            isTabActive 
                              ? `${currentTheme.border} ${currentTheme.lightBg} ${currentTheme.text} font-bold` 
                              : 'border-transparent hover:bg-slate-50 text-slate-600'
                          }`}
                        >
                          <span>{cat.name}</span>
                          <span className={`text-xs px-2 py-1 rounded-full font-medium ${isTabActive ? 'bg-white' : 'bg-slate-200'}`}>
                            {count}問
                          </span>
                        </button>
                      </li>
                    );
                  })}
                </ul>
                <div className="p-4 bg-slate-50 border-t border-slate-200 text-sm font-medium text-slate-600">
                  合計: {activeGameQuestionsCount} 問
                </div>
              </div>
            </aside>

            {/* メインコンテンツ（問題リスト） */}
            <div className="flex-1">
              <div className="mb-6 pb-4 border-b border-slate-200">
                <h2 className={`text-2xl font-bold ${currentTheme.text}`}>{activeCategoryDesc.name}：{activeCategoryDesc.title}</h2>
                <p className="text-slate-500 mt-2">{activeCategoryDesc.desc}</p>
              </div>

              <div className="space-y-4">
                {filteredQuestions.length === 0 ? (
                  <div className="bg-white rounded-lg p-12 text-center border-2 border-dashed border-slate-300">
                    <p className="text-slate-500 mb-4">この大問にはまだ問題がありません。</p>
                    <button
                      onClick={() => addQuestion(activeTab)}
                      className={`inline-flex items-center space-x-2 text-white px-4 py-2 rounded-md transition-colors ${currentTheme.primary} ${currentTheme.hover}`}
                    >
                      <Plus className="w-4 h-4" />
                      <span>最初の問題を追加</span>
                    </button>
                  </div>
                ) : (
                  filteredQuestions.map((q, index) => (
                    <div key={q.id} className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden transition-all">
                      
                      {/* アコーディオンヘッダー */}
                      <div 
                        className="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50"
                        onClick={() => setExpandedId(expandedId === q.id ? null : q.id)}
                      >
                        <div className="flex items-center space-x-3 overflow-hidden">
                          <GripVertical className="w-5 h-5 text-slate-400 flex-shrink-0" />
                          <span className={`font-bold flex-shrink-0 ${currentTheme.text}`}>Q{index + 1}.</span>
                          <span className="font-medium truncate text-slate-700">
                            {q.text || <span className="text-slate-400 italic">問題文を入力してください...</span>}
                          </span>
                        </div>
                        <div className="flex items-center space-x-4 flex-shrink-0 ml-4">
                          {expandedId === q.id ? <ChevronUp className="w-5 h-5 text-slate-400" /> : <ChevronDown className="w-5 h-5 text-slate-400" />}
                        </div>
                      </div>

                      {/* 展開される編集エリア */}
                      {expandedId === q.id && (
                        <div className={`p-5 border-t border-slate-100 ${currentTheme.lightBg} bg-opacity-30`}>
                          <div className="space-y-4">
                            
                            {/* 問題文 */}
                            <div>
                              <label className="block text-sm font-bold text-slate-700 mb-1">問題文</label>
                              <textarea
                                value={q.text}
                                onChange={(e) => updateQuestion(q.id, 'text', e.target.value)}
                                className="w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-400 outline-none"
                                rows="2"
                                placeholder="問題文を入力"
                              />
                            </div>

                            {/* 模範解答 */}
                            <div>
                              <label className="block text-sm font-bold text-slate-700 mb-1">模範解答</label>
                              <textarea
                                value={q.correctAnswer}
                                onChange={(e) => updateQuestion(q.id, 'correctAnswer', e.target.value)}
                                className={`w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-400 outline-none font-medium ${currentTheme.text}`}
                                rows="2"
                                placeholder="テストの正解として表示される模範解答を入力"
                              />
                            </div>

                            {/* 解説 */}
                            <div>
                              <label className="block text-sm font-bold text-slate-700 mb-1">解説 <span className="text-xs font-normal text-slate-500">(任意)</span></label>
                              <textarea
                                value={q.explanation}
                                onChange={(e) => updateQuestion(q.id, 'explanation', e.target.value)}
                                className="w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-400 outline-none text-sm"
                                rows="2"
                                placeholder="フォーム提出後に表示されるフィードバックになります"
                              />
                            </div>

                            {/* アクションボタン */}
                            <div className="flex justify-end pt-2 border-t border-slate-200">
                              <button
                                onClick={() => removeQuestion(q.id)}
                                className="flex items-center space-x-1 text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-md transition-colors text-sm font-medium"
                              >
                                <Trash2 className="w-4 h-4" />
                                <span>この問題を削除</span>
                              </button>
                            </div>

                          </div>
                        </div>
                      )}
                    </div>
                  ))
                )}
                
                {/* 追加ボタン */}
                {filteredQuestions.length > 0 && (
                  <button
                    onClick={() => addQuestion(activeTab)}
                    className={`w-full flex items-center justify-center space-x-2 py-4 border-2 border-dashed border-slate-300 text-slate-500 rounded-lg transition-colors font-medium ${currentTheme.addBtnHover}`}
                  >
                    <Plus className="w-5 h-5" />
                    <span>{activeTab} に新しい問題を追加</span>
                  </button>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
